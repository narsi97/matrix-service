version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1.3

executors:
  go-executor:
    docker:
      - image: cimg/go:1.22
    working_directory: ~/repo

jobs:
  build-and-test:
    executor: go-executor
    steps:
      - checkout

      - run:
          name: Download dependencies
          command: go mod tidy

      - run:
          name: Run unit tests
          command: go test -v ./...

      - run:
          name: Run race detector
          command: go test -race ./...

      - run:
          name: Run benchmarks
          command: go test -bench=. ./...

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - setup_remote_docker

      - run:
          name: Build Docker image
          command: |
            docker build -t $DOCKER_USERNAME/matrix-service:$CIRCLE_SHA1 .

      - run:
          name: Login to DockerHub
          command: |
            echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - run:
          name: Push Docker image
          command: |
            docker push $DOCKER_USERNAME/matrix-service:$CIRCLE_SHA1

  deploy-to-eks:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - run:
          name: Install AWS CLI
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install

      - run:
          name: Install kubectl
          command: |
            curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/

      - run:
          name: Install Helm
          command: |
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - run:
          name: Configure kubeconfig for EKS
          command: |
            aws eks update-kubeconfig \
              --region $AWS_REGION \
              --name $EKS_CLUSTER_NAME \

      - run:
          name: Verify cluster access
          command: kubectl get nodes

      - run:
          name: Deploy using Helm
          command: |
            helm upgrade --install matrix-service ./helm \
              --set image.repository=$DOCKER_USERNAME/matrix-service \
              --set image.tag=$CIRCLE_SHA1

workflows:
  version: 2

  ci-cd:
    jobs:
      - build-and-test

      - docker-build-and-push:
          requires:
            - build-and-test

      - deploy-to-eks:
          requires:
            - docker-build-and-push
          filters:
            branches:
              only: main