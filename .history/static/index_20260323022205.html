<!DOCTYPE html>
<html>
<head>
    <title>Matrix Operations Service</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #2c3e50;
        }
        .container {
            max-width: 700px;
        }
        .buttons {
            margin-top: 15px;
        }
        .buttons button {
            padding: 8px 16px;
            margin-right: 10px;
            cursor: pointer;
        }
        input[type="file"] {
            margin-top: 10px;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Matrix Operations</h1>

        <p>Upload a CSV file and select an operation:</p>

        <!-- File Input -->
        <input type="file" id="fileInput" />

        <!-- Buttons in one line -->
        <div class="buttons">
            <button onclick="submitForm('echo')">Echo</button>
            <button onclick="submitForm('invert')">Invert</button>
            <button onclick="submitForm('flatten')">Flatten</button>
            <button onclick="submitForm('add')">Add</button>
            <button onclick="submitForm('multiply')">Multiply</button>
        </div>

        <h3>Result:</h3>
        <pre id="result"></pre>
    </div>

    <script>
        const BASE_URL = "http://k8s-default-matrixse-380769645e-830362ed4fae9db2.elb.us-east-2.amazonaws.com";

        function submitForm(operation) {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file first!");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            fetch(`${BASE_URL}/${operation}`, {
                method: "POST",
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            })
            .catch(error => {
                document.getElementById("result").innerText = "Error: " + error;
            });
        }
    </script>
</body>
</html>
