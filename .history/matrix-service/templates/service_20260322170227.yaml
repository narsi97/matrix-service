apiVersion: v1
kind: Service
metadata:
  name: {{ include "matrix-service.fullname" . }}
  labels:
    {{- include "matrix-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "matrix-service.selectorLabels" . | nindent 4 }}
